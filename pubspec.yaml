name: flutter_learning
description: A new Flutter project.
# 下面这一行可防止包被误发布到 pub.dev。
# 私有项目建议保留该配置。
publish_to: 'none' # 如果你希望发布到 pub.dev，请删除此行

# 下面定义应用的版本号和构建号。
# 版本号由三段数字组成，例如 1.2.43。
# 后面可选追加构建号，使用 + 分隔。
# 在执行 flutter build 时，可通过 --build-name 和 --build-number 覆盖。
# 在 Android 中，build-name 对应 versionName，build-number 对应 versionCode。
# Android 版本说明见：https://developer.android.com/studio/publish/versioning
# 在 iOS 中，build-name 对应 CFBundleShortVersionString，build-number 对应 CFBundleVersion。
# iOS 版本说明见：
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# 在 Windows 中，build-name 用作产品与文件版本的主/次/修订号，
# build-number 用作构建后缀。
version: 1.0.0+1

environment:
  sdk: '>=3.2.6 <4.0.0'
  flutter: '>=3.16.0'

# dependencies 用于声明项目运行所需的依赖包。
# 若要自动升级到最新主版本，可执行 `flutter pub upgrade --major-versions`。
# 也可以手动修改下方版本号到 pub.dev 上的最新版本。
# 若想查看哪些依赖有可升级版本，可执行 `flutter pub outdated`。
dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.2
  html: ^0.15.5
  tdesign_flutter: ^0.2.7
  shared_preferences: ^2.3.2


  # 下面添加 Cupertino Icons 图标字体。
  # 可配合 CupertinoIcons 类使用 iOS 风格图标。
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 下方的 "flutter_lints" 提供一组推荐的代码检查规则，
  # 用于帮助保持良好的编码规范。该规则集会在项目根目录的
  # `analysis_options.yaml` 中启用。若要关闭某些规则或启用更多规则，
  # 请查看该文件的说明。
  flutter_lints: ^2.0.0

# 关于本文件中通用 Dart 配置的说明，请参考：
# https://dart.dev/tools/pub/pubspec

# 下面这一节是 Flutter 项目专用配置。
flutter:

  # 下面这一行用于确保 Material Icons 字体被打包进应用，
  # 这样你就可以在 material Icons 类中使用这些图标。
  uses-material-design: true

  # 若要向应用添加静态资源，请增加 assets 配置，例如：
  assets:
   - assets/images/

  # 图片资源可配置一个或多个不同分辨率的变体，详见：
  # https://flutter.dev/assets-and-images/#resolution-aware

  # 关于从依赖包中引入资源的说明，详见：
  # https://flutter.dev/assets-and-images/#from-packages

  # 若要添加自定义字体，请在这里（flutter 节点下）增加 fonts 配置。
  # 列表中的每一项都应包含：
  # - "family"：字体家族名称
  # - "fonts"：字体资源列表及其描述（如字重、样式）
  # 示例：
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # 关于从依赖包中引入字体的说明，详见：
  # see https://flutter.dev/custom-fonts/#from-packages
